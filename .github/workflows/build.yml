name: Build Executables

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            ext: .exe
          - os: ubuntu-latest
            platform: linux
            ext: ""
          - os: macos-latest
            platform: macos
            ext: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build client
        run: |
          pyinstaller --onefile --name "client_${{ matrix.platform }}" client.py

      - name: Build server
        run: |
          pyinstaller --onefile --name "server_${{ matrix.platform }}" server.py

      - name: Bundle config templates with executables
        shell: bash
        run: |
          cp client_config.toml dist/
          cp server_config.toml dist/

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client_${{ matrix.platform }}
          path: |
            dist/client_${{ matrix.platform }}${{ matrix.ext }}
            dist/client_config.toml

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server_${{ matrix.platform }}
          path: |
            dist/server_${{ matrix.platform }}${{ matrix.ext }}
            dist/server_config.toml
